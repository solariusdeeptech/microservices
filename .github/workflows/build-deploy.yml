name: Build & Deploy Microservices

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: microservices-497617
  GCP_REGION: europe-west1
  ARTIFACT_REGISTRY: europe-west1-docker.pkg.dev/microservices-497617/solarius

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: julia-geostat
            path: julia-geostat
          - name: python-viz
            path: python-viz

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ matrix.service.name }}:latest \
            ./${{ matrix.service.path }}
        timeout-minutes: 180

      - name: Push to Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ matrix.service.name }}:latest

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: julia-geostat
            memory: 8Gi
            cpu: "4"
            min_instances: "1"
            max_instances: "5"
            timeout: "600"
            concurrency: "10"
          - name: python-viz
            memory: 4Gi
            cpu: "2"
            min_instances: "0"
            max_instances: "10"
            timeout: "300"
            concurrency: "20"

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ matrix.service.name }} \
            --image ${{ env.ARTIFACT_REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 8080 \
            --memory ${{ matrix.service.memory }} \
            --cpu ${{ matrix.service.cpu }} \
            --timeout ${{ matrix.service.timeout }} \
            --min-instances ${{ matrix.service.min_instances }} \
            --max-instances ${{ matrix.service.max_instances }} \
            --concurrency ${{ matrix.service.concurrency }} \
            --cpu-boost \
            --no-cpu-throttling \
            --set-env-vars="API_KEY_GEOECONOMIX=${{ secrets.API_KEY_GEOECONOMIX }},API_KEY_GEOMATRIX=${{ secrets.API_KEY_GEOMATRIX }},API_KEY_TERRAEXPLORATION=${{ secrets.API_KEY_TERRAEXPLORATION }},JULIA_NUM_THREADS=4" \
            --allow-unauthenticated

      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe ${{ matrix.service.name }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "Service ${{ matrix.service.name }} deployed at: $URL"
