# ============================================
# Solarius Microservices — Docker Compose
# Local development & testing
# ============================================

version: '3.9'

services:
  # --- Python Geostat Service ---
  python-geostat:
    build:
      context: ./python-geostat
      dockerfile: Dockerfile
    container_name: solarius-geostat
    ports:
      - "8081:8080"
    environment:
      - API_KEY_GEOECONOMIX=${API_KEY_GEOECONOMIX:-dev-geoeconomix-key}
      - API_KEY_GEOMATRIX=${API_KEY_GEOMATRIX:-dev-geomatrix-key}
      - API_KEY_TERRAEXPLORATION=${API_KEY_TERRAEXPLORATION:-dev-terra-key}
    volumes:
      - ./python-geostat/src:/app/src:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- Python Viz Service ---
  python-viz:
    build:
      context: ./python-viz
      dockerfile: Dockerfile
    container_name: solarius-viz
    ports:
      - "8082:8080"
    environment:
      - PYVISTA_OFF_SCREEN=true
      - API_KEY_GEOECONOMIX=${API_KEY_GEOECONOMIX:-dev-geoeconomix-key}
      - API_KEY_GEOMATRIX=${API_KEY_GEOMATRIX:-dev-geomatrix-key}
      - API_KEY_TERRAEXPLORATION=${API_KEY_TERRAEXPLORATION:-dev-terra-key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- Julia Geostat (Cloud Batch testing) ---
  julia-geostat:
    build:
      context: ./julia-geostat
      dockerfile: Dockerfile
    container_name: solarius-julia
    ports:
      - "8083:8080"
    environment:
      - JULIA_NUM_THREADS=auto
      - API_KEY_GEOECONOMIX=${API_KEY_GEOECONOMIX:-dev-geoeconomix-key}
      - API_KEY_GEOMATRIX=${API_KEY_GEOMATRIX:-dev-geomatrix-key}
      - API_KEY_TERRAEXPLORATION=${API_KEY_TERRAEXPLORATION:-dev-terra-key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # --- API Gateway ---
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: solarius-gateway
    ports:
      - "8080:8080"
    environment:
      - PYTHON_GEOSTAT_URL=http://python-geostat:8080
      - PYTHON_VIZ_URL=http://python-viz:8080
      - API_KEY_GEOECONOMIX=${API_KEY_GEOECONOMIX:-dev-geoeconomix-key}
      - API_KEY_GEOMATRIX=${API_KEY_GEOMATRIX:-dev-geomatrix-key}
      - API_KEY_TERRAEXPLORATION=${API_KEY_TERRAEXPLORATION:-dev-terra-key}
      - GCP_PROJECT_ID=microservices-497617
      - GCS_BUCKET=solarius-jobs
      - LOG_LEVEL=DEBUG
    depends_on:
      python-geostat:
        condition: service_healthy
      python-viz:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- SolReel Render Service (Playwright + FFmpeg) ---
  solreel-render:
    build:
      context: ./solreel-render
      dockerfile: Dockerfile
    container_name: solarius-solreel-render
    ports:
      - "8084:8080"
    environment:
      - GCP_PROJECT_ID=microservices-497617
      - GCP_REGION=europe-west1
      - GCS_BUCKET_SOLREEL=${GCS_BUCKET_SOLREEL:-solreel-renders}
      - SOLREEL_API_KEY=${SOLREEL_API_KEY:-dev-solreel-key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
