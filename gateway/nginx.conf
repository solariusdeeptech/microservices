# ============================================
# Solarius API Gateway — Nginx Config
# Route /julia/* → Julia service
# Route /python/* → Python service
# ============================================

events {
    worker_connections 1024;
}

http {
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time api_key=$http_x_api_key';
    access_log /var/log/nginx/access.log main;

    # Rate limiting
    limit_req_zone $http_x_api_key zone=api:10m rate=100r/s;

    # Timeouts for long computations
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;

    # Max body size for large block models
    client_max_body_size 100M;

    upstream julia_backend {
        server julia-geostat:8080;
    }

    upstream python_backend {
        server python-viz:8081;
    }

    server {
        listen 80;
        server_name _;

        # Health check (no auth)
        location /health {
            return 200 '{"status": "healthy", "gateway": "nginx", "services": ["julia-geostat", "python-viz"]}';
            add_header Content-Type application/json;
        }

        # Julia Geostat routes
        location /julia/ {
            limit_req zone=api burst=20 nodelay;

            # Strip /julia/ prefix
            rewrite ^/julia/(.*) /$1 break;
            proxy_pass http://julia_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-API-Key $http_x_api_key;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Python Viz routes
        location /python/ {
            limit_req zone=api burst=20 nodelay;

            # Strip /python/ prefix
            rewrite ^/python/(.*) /$1 break;
            proxy_pass http://python_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-API-Key $http_x_api_key;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Direct Julia routes (backward compatibility)
        location ~ ^/(variography|kriging|sgs|montecarlo|pit-optimize|block-model)$ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://julia_backend;
            proxy_set_header X-API-Key $http_x_api_key;
        }

        # Direct Python routes (backward compatibility)
        location ~ ^/(render-3d|mps|sections|drillholes)$ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://python_backend;
            proxy_set_header X-API-Key $http_x_api_key;
        }
    }
}
